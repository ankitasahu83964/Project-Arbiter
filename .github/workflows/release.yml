name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "windows-release"

      - name: Build arbiter-app (background service)
        run: cargo build --release --package arbiter-app

      - name: Build arbiter-forge (UI)
        run: cargo build --release --package arbiter-forge

      - name: Build offline wiki HTML
        shell: pwsh
        run: |
          $wikiSrc = "doc\wiki_pages"
          $wikiOut = "dist\wiki-offline"
          New-Item -ItemType Directory -Force -Path $wikiOut | Out-Null

          # Copy all wiki source files so markdown/text is still available offline.
          Copy-Item "$wikiSrc\*" $wikiOut -Recurse -Force

          # Keeping this simple: ship a usable offline page with the quick manual
          # rendered inline from README.txt, plus links to raw files.
          $readmeText = Get-Content -Raw "$wikiOut\README.txt"
          $readmeHtml = [System.Net.WebUtility]::HtmlEncode($readmeText)

          $html = @"
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Project Arbiter Offline Wiki</title>
            <style>
              body { font-family: "Segoe UI", Tahoma, sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
              .wrap { max-width: 960px; margin: 0 auto; padding: 24px; }
              .card { background: #111827; border: 1px solid #334155; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
              h1 { margin-top: 0; font-size: 28px; }
              a { color: #38bdf8; text-decoration: none; }
              a:hover { text-decoration: underline; }
              ul { line-height: 1.7; }
              pre { white-space: pre-wrap; line-height: 1.45; font-family: Consolas, "Courier New", monospace; }
              code { background: #1f2937; padding: 2px 6px; border-radius: 6px; }
            </style>
          </head>
          <body>
            <div class="wrap">
              <div class="card">
                <h1>Project Arbiter Offline Wiki</h1>
                <p>This release includes offline documentation files.</p>
                <ul>
                  <li><a href="README.txt">Open quick manual (TXT)</a></li>
                  <li><a href="README.md">Open quick manual (Markdown)</a></li>
                </ul>
              </div>
              <div class="card">
                <h2>Quick Manual</h2>
                <pre>$readmeHtml</pre>
              </div>
            </div>
          </body>
          </html>
          "@

          Set-Content -Path "$wikiOut\index.html" -Value $html -Encoding UTF8

      - name: Create release archive
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $outDir = "dist\arbiter-$version"
          New-Item -ItemType Directory -Force -Path $outDir

          Copy-Item "target\release\arbiter.exe"       "$outDir\arbiter.exe"
          Copy-Item "target\release\arbiter-forge.exe" "$outDir\arbiter-forge.exe"
          Copy-Item "arbiter-app\assets\icon.ico"      "$outDir\icon.ico" -ErrorAction SilentlyContinue
          Copy-Item "doc\wiki_pages\README.txt"       "$outDir\README.txt"
          Copy-Item "dist\wiki-offline"                "$outDir\wiki" -Recurse -Force

          Compress-Archive -Path "$outDir\*" -DestinationPath "arbiter-$version-windows-x64.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: arbiter-windows-x64
          path: arbiter-*.zip
          retention-days: 7

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-windows
    permissions:
      contents: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: arbiter-windows-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Arbiter ${{ github.ref_name }}"
          body: |
            Release ${{ github.ref_name }}

            ### Installation
            1. Download and extract the zip archive.
            2. Run `arbiter.exe` as Administrator to start the background service.
            3. Open Forge from the system tray icon (`Open Forge`).

            Configuration (ledger.toml and arbiter.vault) is created automatically in an `arbiter-data` directory next to the executables on first launch.
          files: arbiter-*.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
